<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Podify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --green: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
      --player-h: 140px;
      --radius: 12px;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: var(--player-h);
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 13, 13, 0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .search-row {
      display: flex;
      flex: 1;
      gap: 8px;
    }

    #search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input:focus {
      border-color: var(--accent);
    }

    #search-input::placeholder {
      color: var(--muted);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    /* TABS */
    .tabs {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      padding: 14px 20px 0;
    }

    .tab {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text);
      background: var(--surface);
    }

    .tab.active {
      color: var(--text);
      background: var(--surface2);
    }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* SECTION TITLE */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* SPINNER */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ERROR */
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* RESULT CARDS */
    .result-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.2s, background 0.2s;
    }

    .result-card:hover {
      border-color: #3a3a3a;
      background: var(--surface2);
    }

    .result-thumb {
      width: 88px;
      height: 58px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 12px;
      color: var(--muted2);
      display: flex;
      gap: 10px;
    }

    .result-dur {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    .btn-dl {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-dl:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-dl.loading {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-dl.done {
      border-color: var(--green);
      color: var(--green);
    }

    .btn-dl.error {
      border-color: var(--red);
      color: var(--red);
    }

    /* LIBRARY */
    .lib-stats {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .lib-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lib-item:hover {
      border-color: #3a3a3a;
      background: var(--surface2);
    }

    .lib-item.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .lib-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--muted);
    }

    .lib-item.active .lib-icon {
      background: rgba(99, 102, 241, 0.2);
      color: var(--accent);
    }

    .lib-info {
      flex: 1;
      min-width: 0;
    }

    .lib-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .lib-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .lib-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-icon.play:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lib-item.active .btn-icon.play {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon.del:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ── PLAYER ── */
    #player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--player-h);
      background: rgba(22, 22, 22, 0.97);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: none;
      z-index: 200;
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }

    #player.visible {
      display: block;
    }

    .player-inner {
      max-width: 860px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .player-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .ctrl:hover {
      color: var(--text);
    }

    .ctrl.play-pause {
      width: 40px;
      height: 40px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
    }

    .ctrl.play-pause:hover {
      opacity: 0.88;
    }

    .speed-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted2);
      border-radius: 6px;
      padding: 4px 9px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .speed-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      width: 34px;
      flex-shrink: 0;
    }

    .time.right {
      text-align: right;
    }

    #progress {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    #volume {
      width: 72px;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted2);
      cursor: pointer;
    }

    /* TOAST */
    #toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 540px) {
      .result-thumb {
        width: 70px;
        height: 46px;
      }

      #volume {
        display: none;
      }

      .result-sub .result-dur {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo">Podify</div>
      <div class="search-row">
        <input id="search-input" type="search" placeholder="Search YouTube — Bad Bunny, lectures, podcasts..."
          autocomplete="off">
        <button class="btn-primary" onclick="doSearch()">Search</button>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="search-view" onclick="switchTab(this)">Search</button>
    <button class="tab" data-view="library-view" onclick="switchTab(this)">Library</button>
  </div>

  <main>
    <!-- SEARCH VIEW -->
    <div id="search-view" class="view active">
      <div id="search-spinner" style="display:none">
        <div class="spinner-wrap">
          <div class="spinner"></div>
        </div>
      </div>
      <div id="search-error" class="error-msg" style="display:none"></div>
      <div id="search-results"></div>
    </div>

    <!-- LIBRARY VIEW -->
    <div id="library-view" class="view">
      <div class="section-title">Your Library</div>
      <div id="lib-stats" class="lib-stats"></div>
      <div id="library-list"></div>
    </div>
  </main>

  <!-- PLAYER -->
  <div id="player">
    <div class="player-inner">
      <div class="player-top">
        <div class="player-title" id="player-title">—</div>
        <div class="player-controls">
          <button class="ctrl" onclick="prevTrack()" title="Previous">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z" />
            </svg>
          </button>
          <button class="ctrl play-pause" id="pp-btn" onclick="togglePlay()">
            <svg id="icon-play" width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z" />
            </svg>
            <svg id="icon-pause" width="18" height="18" fill="currentColor" viewBox="0 0 20 20" style="display:none">
              <path
                d="M5.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75A.75.75 0 007.25 3h-1.5zM12.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75a.75.75 0 00-.75-.75h-1.5z" />
            </svg>
          </button>
          <button class="ctrl" onclick="nextTrack()" title="Next">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M11.555 5.168A1 1 0 0010 6v2.798L4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202V14a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z" />
            </svg>
          </button>
          <button class="speed-btn" id="speed-btn" onclick="cycleSpeed()">1×</button>
          <svg width="14" height="14" fill="currentColor" style="color:var(--muted);flex-shrink:0" viewBox="0 0 20 20">
            <path
              d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" />
          </svg>
          <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
        </div>
      </div>
      <div class="progress-row">
        <span class="time" id="t-cur">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
        <span class="time right" id="t-tot">0:00</span>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <audio id="aud"></audio>

  <script>
    const aud = document.getElementById('aud');
    let library = [];
    let curIdx = -1;
    const speeds = [0.75, 1, 1.25, 1.5, 2];
    let spdIdx = 1;

    // ── TABS ────────────────────────────────────────────────
    function switchTab(btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
    }

    // ── SEARCH ──────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;

      // switch to search tab
      document.querySelectorAll('.tab')[0].click();

      const spinner = document.getElementById('search-spinner');
      const errEl = document.getElementById('search-error');
      const resEl = document.getElementById('search-results');

      spinner.style.display = 'block';
      errEl.style.display = 'none';
      resEl.innerHTML = '';

      try {
        const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Search failed');

        spinner.style.display = 'none';

        if (!data.length) {
          resEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No results found. Try a different search.</p></div>';
          return;
        }

        resEl.innerHTML = data.map((v, i) => `
      <div class="result-card">
        <img class="result-thumb" src="${esc(v.thumbnail_url)}" loading="lazy" onerror="this.style.background='#1e1e1e'">
        <div class="result-info">
          <div class="result-title" title="${esc(v.title)}">${esc(v.title)}</div>
          <div class="result-sub">
            <span>${esc(v.channel)}</span>
            <span class="result-dur">${v.duration}</span>
          </div>
        </div>
        <button class="btn-dl" onclick="dlTrack(this, '${esc(v.video_url)}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
          Save
        </button>
      </div>
    `).join('');
      } catch (e) {
        spinner.style.display = 'none';
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    }

    async function dlTrack(btn, url) {
      btn.classList.add('loading');
      btn.innerHTML = `<div class="spinner" style="width:13px;height:13px;border-width:2px;flex-shrink:0"></div> Saving…`;
      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed');
        btn.classList.remove('loading');
        btn.classList.add('done');
        btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Saved`;
        toast('Saved to library');
        loadLibrary();
      } catch (e) {
        btn.classList.remove('loading');
        btn.classList.add('error');
        btn.textContent = '✗ Error';
        toast(e.message || 'Download failed');
        setTimeout(() => {
          btn.classList.remove('error');
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg> Save`;
        }, 3000);
      }
    }

    // ── LIBRARY ──────────────────────────────────────────────
    async function loadLibrary() {
      try {
        const res = await fetch('/files');
        library = await res.json();
        renderLibrary();
      } catch (e) {
        document.getElementById('library-list').innerHTML =
          '<div class="error-msg">Could not load library. Is the server running?</div>';
      }
    }

    function renderLibrary() {
      const el = document.getElementById('library-list');
      const stats = document.getElementById('lib-stats');

      const totalMB = library.reduce((s, f) => s + f.size_mb, 0);
      stats.textContent = `${library.length} track${library.length !== 1 ? 's' : ''} · ${totalMB.toFixed(1)} MB`;

      if (!library.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🎧</div><p>No tracks yet — search and save something.</p></div>';
        return;
      }

      el.innerHTML = library.map((f, i) => `
    <div class="lib-item ${i === curIdx ? 'active' : ''}" onclick="playTrack(${i})">
      <div class="lib-icon">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
          <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
        </svg>
      </div>
      <div class="lib-info">
        <div class="lib-title">${esc(f.title)}</div>
        <div class="lib-meta">${f.size_mb} MB · ${new Date(f.date_added).toLocaleDateString()}</div>
      </div>
      <div class="lib-actions" onclick="event.stopPropagation()">
        <button class="btn-icon play" onclick="playTrack(${i})" title="Play">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
        </button>
        <button class="btn-icon del" onclick="delTrack('${esc(f.filename)}', ${i})" title="Delete">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
    }

    async function delTrack(filename, idx) {
      if (!confirm('Delete this track?')) return;
      await fetch(`/audio/${encodeURIComponent(filename)}`, { method: 'DELETE' });
      if (curIdx === idx) {
        aud.pause();
        document.getElementById('player').classList.remove('visible');
        curIdx = -1;
      } else if (curIdx > idx) {
        curIdx--;
      }
      toast('Deleted');
      loadLibrary();
    }

    // ── PLAYER ──────────────────────────────────────────────
    function playTrack(idx) {
      if (idx < 0 || idx >= library.length) return;
      curIdx = idx;
      const f = library[idx];
      aud.src = `/audio/${encodeURIComponent(f.filename)}`;
      aud.playbackRate = speeds[spdIdx];
      aud.play();
      document.getElementById('player-title').textContent = f.title;
      document.getElementById('player').classList.add('visible');
      renderLibrary();
      setupMediaSession(f.title);
    }

    function togglePlay() {
      if (!aud.src) return;
      aud.paused ? aud.play() : aud.pause();
    }

    function prevTrack() { if (curIdx > 0) playTrack(curIdx - 1); }
    function nextTrack() { if (curIdx < library.length - 1) playTrack(curIdx + 1); }

    function cycleSpeed() {
      spdIdx = (spdIdx + 1) % speeds.length;
      aud.playbackRate = speeds[spdIdx];
      document.getElementById('speed-btn').textContent = speeds[spdIdx] + '×';
    }

    aud.addEventListener('play', () => {
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = 'block';
    });
    aud.addEventListener('pause', () => {
      document.getElementById('icon-play').style.display = 'block';
      document.getElementById('icon-pause').style.display = 'none';
    });
    aud.addEventListener('ended', () => nextTrack());
    aud.addEventListener('timeupdate', () => {
      if (!aud.duration) return;
      document.getElementById('progress').value = (aud.currentTime / aud.duration) * 100;
      document.getElementById('t-cur').textContent = fmt(aud.currentTime);
      document.getElementById('t-tot').textContent = fmt(aud.duration);
    });

    document.getElementById('progress').addEventListener('input', e => {
      aud.currentTime = (e.target.value / 100) * aud.duration;
    });
    document.getElementById('volume').addEventListener('input', e => {
      aud.volume = e.target.value;
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'ArrowRight') nextTrack();
      if (e.code === 'ArrowLeft') prevTrack();
    });

    // ── MEDIA SESSION ────────────────────────────────────────
    function setupMediaSession(title) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({ title, artist: 'Podify' });
      navigator.mediaSession.setActionHandler('play', () => aud.play());
      navigator.mediaSession.setActionHandler('pause', () => aud.pause());
      navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
      navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
      navigator.mediaSession.setActionHandler('seekto', e => { aud.currentTime = e.seekTime; });
    }

    // ── UTILS ────────────────────────────────────────────────
    function fmt(s) {
      if (!s || isNaN(s)) return '0:00';
      return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
    }
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── INIT ─────────────────────────────────────────────────
    loadLibrary();
  </script>
</body>

</html>
