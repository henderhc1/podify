<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podify - Personal Podcast Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
            font-weight: 700;
        }

        .nav-tabs {
            display: flex;
            gap: 1rem;
        }

        .nav-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: #a1a1aa;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-tab.active {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }

        .nav-tab:hover {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }

        .container {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-section {
            margin-bottom: 3rem;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(30, 30, 46, 0.8);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: rgba(15, 15, 23, 0.8);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        #search-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #search-btn {
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .spinner {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .results {
            display: none;
            margin-top: 2rem;
        }

        .result-card {
            display: flex;
            background: rgba(30, 30, 46, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .result-thumb {
            width: 120px;
            height: 90px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
            color: #f1f5f9;
        }

        .result-channel {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .result-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .result-duration {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .download-btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(45deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .download-btn.downloading {
            background: linear-gradient(45deg, #f59e0b, #d97706);
        }

        .download-btn.done {
            background: linear-gradient(45deg, #10b981, #059669);
        }

        .library {
            margin-bottom: 3rem;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .library h2 {
            color: #f1f5f9;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .library-stats {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .library-item {
            display: flex;
            align-items: center;
            background: rgba(30, 30, 46, 0.8);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            gap: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .library-item:hover {
            background: rgba(30, 30, 46, 0.9);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .library-item.playing {
            background: rgba(99, 102, 241, 0.1);
            border: 2px solid #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .track-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 1.5rem;
        }

        .library-info {
            flex: 1;
        }

        .library-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #f1f5f9;
            margin-bottom: 0.25rem;
        }

        .library-meta {
            display: flex;
            gap: 1rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .play-btn,
        .delete-btn {
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .play-btn {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            color: #ffffff;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem 2rem;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
            display: none;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }

        .player-frame {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .player-media {
            width: min(100%, 720px);
            align-self: center;
            max-height: 42vh;
            border-radius: 16px;
            background: #050816;
            object-fit: contain;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        }

        .player.audio-only .player-media {
            display: none;
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .player-info {
            flex: 1 1 220px;
            min-width: 0;
        }

        .player-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: #f1f5f9;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-btn {
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }

        .play-pause-btn {
            font-size: 2rem;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            color: #ffffff;
            padding: 1rem;
            border-radius: 50%;
        }

        .play-pause-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .progress-section {
            flex: 2 1 320px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(71, 85, 105, 0.5);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s ease;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .player-options {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        .speed-selector {
            display: flex;
            gap: 0.25rem;
        }

        .speed-btn {
            padding: 0.25rem 0.5rem;
            background: rgba(71, 85, 105, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .speed-btn.active {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
            border-color: #6366f1;
        }

        .speed-btn:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .volume-icon {
            color: #94a3b8;
            cursor: pointer;
        }

        .volume-slider {
            width: 80px;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(71, 85, 105, 0.5);
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }

        .shuffle-btn,
        .repeat-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .shuffle-btn.active,
        .repeat-btn.active {
            color: #6366f1;
            background: rgba(99, 102, 241, 0.2);
        }

        .shuffle-btn:hover,
        .repeat-btn:hover {
            color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
        }

        .error {
            display: none;
            color: #ef4444;
            text-align: center;
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .error:not(:empty) {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .empty-state h3 {
            color: #f1f5f9;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                order: 2;
            }

            .container {
                padding: 1rem;
            }

            .search-bar {
                flex-direction: column;
            }

            .result-card {
                flex-direction: column;
                text-align: center;
            }

            .result-thumb {
                width: 100%;
                height: 200px;
            }

            .player-content {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .progress-section {
                order: 1;
                width: 100%;
            }

            .player-controls {
                order: 2;
                justify-content: center;
            }

            .player-options {
                order: 3;
                justify-content: center;
                margin-left: 0;
            }

            .player-media {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <h1>Podify</h1>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="search">Search</button>
                <button class="nav-tab" data-tab="library">Library</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div id="search" class="tab-content active">
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="search-input"
                        placeholder="Search for podcasts, music, or any YouTube content...">
                    <button id="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        Search
                    </button>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem; color: #94a3b8;">Searching for content...</p>
                </div>
                <div class="error" id="search-error"></div>
                <div class="results" id="results"></div>
            </div>
        </div>
        <div id="library" class="tab-content">
            <div class="library">
                <div class="library-header">
                    <h2>Your Library</h2>
                    <div class="library-stats" id="library-stats">0 items</div>
                </div>
                <div id="library-list">
                    <div class="empty-state">
                        <h3>No media yet</h3>
                        <p>Search and download some content to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="player" id="player">
        <div class="player-frame">
            <video id="audio" class="player-media" preload="metadata" playsinline></video>
            <div class="player-content">
            <div class="player-info">
                <div class="player-title" id="player-title">No media selected</div>
                <div class="player-artist">Podify</div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="shuffle-btn" title="Shuffle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 3h5v5M4 20L21 3"></path>
                        <path d="M20 16h-5v5M4 4l17 17"></path>
                    </svg>
                </button>
                <button class="control-btn" id="prev-btn" title="Previous">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 20L9 12l10-8v16z"></path>
                        <path d="M5 19V5"></path>
                    </svg>
                </button>
                <button class="control-btn play-pause-btn" id="play-pause-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 3l14 9-14 9V3z"></path>
                    </svg>
                </button>
                <button class="control-btn" id="next-btn" title="Next">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 4l10 8-10 8V4z"></path>
                        <path d="M19 5v14"></path>
                    </svg>
                </button>
                <button class="control-btn" id="repeat-btn" title="Repeat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 2l4 4-4 4"></path>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <path d="M7 22l-4-4 4-4"></path>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>
            <div class="progress-section">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
            <div class="player-options">
                <div class="speed-selector">
                    <button class="speed-btn active" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="1.25">1.25x</button>
                    <button class="speed-btn" data-speed="1.5">1.5x</button>
                    <button class="speed-btn" data-speed="2">2x</button>
                </div>
                <div class="volume-container">
                    <span class="volume-icon" id="volume-icon">&#128266;</span>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        // Use same origin so the app works regardless of port (e.g., 5000)
        const API_BASE = window.location.origin;
        let library = [];
        let currentTrackIndex = -1;
        let isShuffled = false;
        let isRepeating = false;
        let originalOrder = [];
        const audio = document.getElementById('audio');
        const player = document.getElementById('player');
        const playerTitle = document.getElementById('player-title');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeIcon = document.getElementById('volume-icon');

        // Tab switching
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // Load library on page load
        loadLibrary();

        // Search functionality
        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('search-error').textContent = '';
            document.getElementById('results').style.display = 'none';

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000);

            try {
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`, { signal: controller.signal });
                if (!response.ok) throw new Error('Search failed. Please try again.');
                const results = await response.json();
                displayResults(results);
            } catch (error) {
                if (error.name === 'AbortError') {
                    document.getElementById('search-error').textContent = 'Search timed out. Try again.';
                } else {
                    document.getElementById('search-error').textContent = error.message;
                }
            } finally {
                clearTimeout(timeoutId);
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(results) {
            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = '';
            if (results.length === 0) {
                resultsEl.innerHTML = '<div class="empty-state"><h3>No results found</h3><p>Try a different search term.</p></div>';
            } else {
                results.forEach(result => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <img src="${result.thumbnail_url}" alt="Thumbnail" class="result-thumb" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjkwIiB2aWV3Qm94PSIwIDAgMTIwIDkwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjkwIiBmaWxsPSIjMWE0MTY0Ii8+Cjx0ZXh0IHg9IjYwIiB5PSI0NSIgZmlsbD0iIzk0YTNiOCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zNWVtIiBmb250LXNpemU9IjEyIj5ObyBJbWFnZTwvdGV4dD4KPHN2Zz4=';">
                        <div class="result-info">
                            <div class="result-title">${result.title}</div>
                            <div class="result-channel">${result.channel}</div>
                            <div class="result-meta">
                                <span class="result-duration">${result.duration}</span>
                            </div>
                        </div>
                        <button class="download-btn" data-url="${result.video_url}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7,10 12,15 17,10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Download Video
                        </button>
                    `;
                    resultsEl.appendChild(card);
                });
            }
            resultsEl.style.display = 'block';

            // Add download listeners
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = e.target.closest('.download-btn').dataset.url;
                    const button = e.target.closest('.download-btn');
                    const originalHTML = button.innerHTML;
                    button.innerHTML = '<div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div> Downloading...';
                    button.classList.add('downloading');
                    button.disabled = true;

                    try {
                        const response = await fetch(`${API_BASE}/download`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ url })
                        });
                        if (!response.ok) throw new Error('Download failed. Please try again.');
                        button.innerHTML = 'Done';
                        button.classList.remove('downloading');
                        button.classList.add('done');
                        loadLibrary(); // Refresh library
                    } catch (error) {
                        button.innerHTML = 'Error';
                        button.classList.remove('downloading');
                        console.error(error);
                    } finally {
                        setTimeout(() => {
                            button.innerHTML = originalHTML;
                            button.classList.remove('done');
                            button.disabled = false;
                        }, 3000);
                    }
                });
            });
        }

        async function loadLibrary() {
            try {
                const response = await fetch(`${API_BASE}/files`);
                if (!response.ok) throw new Error('Failed to load library');
                library = await response.json();
                originalOrder = [...library];
                displayLibrary();
                updateLibraryStats();
            } catch (error) {
                console.error(error);
            }
        }

        function updateLibraryStats() {
            const statsEl = document.getElementById('library-stats');
            const totalSize = library.reduce((sum, file) => sum + file.size_mb, 0);
            statsEl.textContent = `${library.length} items | ${totalSize.toFixed(1)} MB`;
        }

        function displayLibrary() {
            const listEl = document.getElementById('library-list');
            listEl.innerHTML = '';
            if (library.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><h3>No media yet</h3><p>Search and download some content to get started!</p></div>';
                return;
            }
            library.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = `library-item ${index === currentTrackIndex ? 'playing' : ''}`;
                item.innerHTML = `
                    <div class="track-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 19V6l12-3v13"></path>
                            <path d="M9 12l12-3"></path>
                            <circle cx="6" cy="19" r="3"></circle>
                        </svg>
                    </div>
                    <div class="library-info">
                        <div class="library-title">${file.title}</div>
                        <div class="library-meta">
                            <span>${file.media_type === 'video' ? 'Video' : 'Audio'}</span>
                            <span>${file.size_mb.toFixed(1)} MB</span>
                            <span>${new Date(file.date_added).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <button class="play-btn" data-index="${index}" title="Play">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 3l14 9-14 9V3z"></path>
                        </svg>
                    </button>
                    <button class="delete-btn" data-filename="${file.filename}" title="Delete">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                `;
                listEl.appendChild(item);
            });

            // Add play listeners
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(e.target.closest('.play-btn').dataset.index);
                    playTrack(index);
                });
            });

            // Add delete listeners
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (!confirm('Are you sure you want to delete this item?')) return;
                    const filename = e.target.closest('.delete-btn').dataset.filename;
                    try {
                        const response = await fetch(`${API_BASE}/media/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                        if (!response.ok) throw new Error('Delete failed');
                        loadLibrary();
                        if (currentTrackIndex >= library.length - 1) {
                            stopPlayback();
                        }
                    } catch (error) {
                        console.error(error);
                    }
                });
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function playTrack(index) {
            if (index < 0 || index >= library.length) return;
            currentTrackIndex = index;
            const file = library[index];
            player.classList.toggle('audio-only', file.media_type === 'audio');
            audio.src = `${API_BASE}/media/${encodeURIComponent(file.filename)}`;
            playerTitle.textContent = file.title;
            player.style.display = 'flex';
            audio.play().catch((error) => console.error(error));
            updatePlayPauseBtn();
            displayLibrary();

            // Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: file.title,
                    artist: 'Podify',
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play().catch((error) => console.error(error)));
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => playTrack(currentTrackIndex - 1));
                navigator.mediaSession.setActionHandler('nexttrack', () => playTrack(currentTrackIndex + 1));
            }
        }

        function stopPlayback() {
            audio.pause();
            audio.currentTime = 0;
            audio.removeAttribute('src');
            audio.load();
            currentTrackIndex = -1;
            player.classList.remove('audio-only');
            player.style.display = 'none';
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            totalTimeEl.textContent = '0:00';
            displayLibrary();
        }

        // Media event listeners
        audio.addEventListener('loadedmetadata', () => {
            player.classList.toggle('audio-only', !audio.videoWidth && !audio.videoHeight);
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
            const progress = duration > 0 ? (audio.currentTime / duration) * 100 : 0;
            progressBar.style.width = `${progress}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('ended', () => {
            if (isRepeating) {
                audio.currentTime = 0;
                audio.play().catch((error) => console.error(error));
            } else {
                playTrack(currentTrackIndex + 1);
            }
        });

        audio.addEventListener('play', updatePlayPauseBtn);
        audio.addEventListener('pause', updatePlayPauseBtn);

        function updatePlayPauseBtn() {
            const icon = playPauseBtn.querySelector('svg');
            if (audio.paused) {
                icon.innerHTML = '<path d="M5 3l14 9-14 9V3z"></path>';
            } else {
                icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>';
            }
        }

        // Controls
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch((error) => console.error(error));
            } else {
                audio.pause();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            playTrack(currentTrackIndex - 1);
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            playTrack(currentTrackIndex + 1);
        });

        document.getElementById('shuffle-btn').addEventListener('click', () => {
            isShuffled = !isShuffled;
            document.getElementById('shuffle-btn').classList.toggle('active');
            if (isShuffled) {
                library = shuffleArray([...originalOrder]);
            } else {
                library = [...originalOrder];
            }
            displayLibrary();
            // Update currentTrackIndex to match the new order
            if (currentTrackIndex !== -1) {
                const currentFile = originalOrder[currentTrackIndex];
                currentTrackIndex = library.findIndex(file => file.filename === currentFile.filename);
            }
        });

        document.getElementById('repeat-btn').addEventListener('click', () => {
            isRepeating = !isRepeating;
            document.getElementById('repeat-btn').classList.toggle('active');
        });

        progressContainer.addEventListener('click', (e) => {
            if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const speed = parseFloat(e.target.dataset.speed);
                audio.playbackRate = speed;
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
            updateVolumeIcon();
        });

        volumeIcon.addEventListener('click', () => {
            if (audio.volume > 0) {
                audio.volume = 0;
                volumeSlider.value = 0;
            } else {
                audio.volume = 1;
                volumeSlider.value = 1;
            }
            updateVolumeIcon();
        });

        function updateVolumeIcon() {
            if (audio.volume === 0) {
                volumeIcon.textContent = String.fromCodePoint(128263);
            } else if (audio.volume < 0.5) {
                volumeIcon.textContent = String.fromCodePoint(128265);
            } else {
                volumeIcon.textContent = String.fromCodePoint(128266);
            }
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    playPauseBtn.click();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    document.getElementById('prev-btn').click();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    document.getElementById('next-btn').click();
                    break;
            }
        });
    </script>
</body>

</html>
