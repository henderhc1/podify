app = "spreview"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
PODIFY_YTDLP_MAX_CONCURRENT_LOOKUPS = "1"
PODIFY_YTDLP_FORCE_BOTCHECK_PROFILE = "1"
PODIFY_YTDLP_SLEEP_REQUESTS_SECONDS = "1.0"
PODIFY_YTDLP_BOTCHECK_RETRY_SLEEP_REQUESTS_SECONDS = "2.0"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

# Optional persistent state volume for data/state.json:
# [[mounts]]
# source = "podify_data"
# destination = "/app/data"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
