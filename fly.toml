app = "spreview"
primary_region = "iad"

[build]
builder = "ghcr.io/railwayapp/nixpacks:latest"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

# Optional persistent state volume for data/state.json:
# [[mounts]]
# source = "podify_data"
# destination = "/app/data"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
